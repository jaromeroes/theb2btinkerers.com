<svg viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#1C4A3A"/>
  <!-- Ghost text -->
  <text x="-20" y="580" font-family="Bricolage Grotesque, sans-serif" font-size="320" font-weight="800" fill="rgba(212,232,74,0.04)" letter-spacing="-22">CMO</text>
  <!-- Left: full-time box, crossed out -->
  <rect x="70" y="90" width="310" height="400" rx="5" fill="rgba(20,40,30,0.75)" stroke="rgba(245,240,232,0.07)" stroke-width="1.5"/>
  <text x="225" y="148" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="rgba(245,240,232,0.3)" text-anchor="middle" letter-spacing="2">FULL-TIME CMO</text>
  <!-- Person icon -->
  <circle cx="225" cy="238" r="52" fill="rgba(245,240,232,0.1)"/>
  <circle cx="225" cy="210" r="26" fill="rgba(245,240,232,0.14)"/>
  <path d="M170,285 Q225,258 280,285" stroke="rgba(245,240,232,0.16)" stroke-width="3" fill="none"/>
  <text x="225" y="370" font-family="Inter, sans-serif" font-size="13" fill="rgba(245,240,232,0.22)" text-anchor="middle">fixed cost</text>
  <text x="225" y="390" font-family="Inter, sans-serif" font-size="13" fill="rgba(245,240,232,0.22)" text-anchor="middle">inside view only</text>
  <!-- Cross out -->
  <line x1="100" y1="120" x2="350" y2="460" stroke="rgba(210,60,60,0.4)" stroke-width="2.5"/>
  <line x1="350" y1="120" x2="100" y2="460" stroke="rgba(210,60,60,0.4)" stroke-width="2.5"/>
  <!-- VS -->
  <text x="460" y="335" font-family="Bricolage Grotesque, sans-serif" font-size="36" font-weight="800" fill="rgba(212,232,74,0.28)" text-anchor="middle" letter-spacing="-1">VS</text>
  <!-- Centre: fractional — highlighted box -->
  <rect x="520" y="55" width="360" height="480" rx="5" fill="rgba(212,232,74,0.12)" stroke="rgba(212,232,74,0.3)" stroke-width="2"/>
  <text x="700" y="116" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="rgba(212,232,74,0.65)" text-anchor="middle" letter-spacing="2.5">FRACTIONAL CMO</text>
  <!-- CMO circle icon -->
  <circle cx="700" cy="260" r="100" fill="rgba(212,232,74,0.16)" stroke="rgba(212,232,74,0.32)" stroke-width="2"/>
  <text x="700" y="275" font-family="Bricolage Grotesque, sans-serif" font-size="62" font-weight="800" fill="#D4E84A" text-anchor="middle" letter-spacing="-3">CMO</text>
  <text x="700" y="396" font-family="Inter, sans-serif" font-size="14" fill="rgba(212,232,74,0.6)" text-anchor="middle">outside-in perspective</text>
  <text x="700" y="420" font-family="Inter, sans-serif" font-size="14" fill="rgba(212,232,74,0.45)" text-anchor="middle">cross-company pattern recognition</text>
  <text x="700" y="448" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="rgba(245,240,232,0.35)" text-anchor="middle" letter-spacing="1.5">SENIOR · FLEXIBLE · STRATEGIC</text>
  <text x="700" y="504" font-family="Bricolage Grotesque, sans-serif" font-size="18" font-weight="800" fill="rgba(212,232,74,0.35)" text-anchor="middle" letter-spacing="-0.5">Not a compromise.</text>
  <!-- Right column text -->
  <line x1="920" y1="60" x2="920" y2="570" stroke="rgba(212,232,74,0.08)" stroke-width="1"/>
  <rect x="938" y="70" width="5" height="420" fill="rgba(212,232,74,0.22)"/>
  <text x="960" y="148" font-family="Bricolage Grotesque, sans-serif" font-size="46" font-weight="800" fill="rgba(245,240,232,0.62)" letter-spacing="-2">Not a</text>
  <text x="960" y="202" font-family="Bricolage Grotesque, sans-serif" font-size="46" font-weight="800" fill="rgba(245,240,232,0.62)" letter-spacing="-2">compromise.</text>
  <line x1="960" y1="228" x2="1175" y2="228" stroke="rgba(212,232,74,0.12)" stroke-width="1"/>
  <text x="960" y="272" font-family="Inter, sans-serif" font-size="16" fill="rgba(245,240,232,0.32)">Senior leadership without</text>
  <text x="960" y="296" font-family="Inter, sans-serif" font-size="16" fill="rgba(245,240,232,0.32)">the full-time cost.</text>
  <text x="960" y="360" font-family="Bricolage Grotesque, sans-serif" font-size="28" font-weight="700" fill="rgba(212,232,74,0.45)" letter-spacing="-1">A competitive</text>
  <text x="960" y="396" font-family="Bricolage Grotesque, sans-serif" font-size="28" font-weight="700" fill="rgba(212,232,74,0.45)" letter-spacing="-1">advantage.</text>
</svg>
