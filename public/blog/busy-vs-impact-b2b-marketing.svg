<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="glowGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#00D26A" stop-opacity="0.03"/>
      <stop offset="50%" stop-color="#00D26A" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#00D26A" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#00D26A" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#00D26A" stop-opacity="1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0A0A0A"/>

  <!-- === LEFT SIDE: BUSY — chaotic scattered marks === -->
  
  <!-- Faint checklist lines -->
  <g opacity="0.15">
    <rect x="75" y="148" width="8" height="8" rx="1" stroke="#444" stroke-width="0.8" fill="none"/>
    <line x1="95" y1="152" x2="340" y2="152" stroke="#333" stroke-width="0.7"/>
    <rect x="75" y="183" width="8" height="8" rx="1" stroke="#444" stroke-width="0.8" fill="none"/>
    <line x1="95" y1="187" x2="410" y2="187" stroke="#333" stroke-width="0.7"/>
    <rect x="75" y="218" width="8" height="8" rx="1" stroke="#444" stroke-width="0.8" fill="none"/>
    <line x1="95" y1="222" x2="290" y2="222" stroke="#333" stroke-width="0.7"/>
    <rect x="75" y="253" width="8" height="8" rx="1" stroke="#444" stroke-width="0.8" fill="none"/>
    <line x1="95" y1="257" x2="380" y2="257" stroke="#333" stroke-width="0.7"/>
    <rect x="75" y="288" width="8" height="8" rx="1" stroke="#444" stroke-width="0.8" fill="none"/>
    <line x1="95" y1="292" x2="320" y2="292" stroke="#333" stroke-width="0.7"/>
    <rect x="75" y="323" width="8" height="8" rx="1" stroke="#444" stroke-width="0.8" fill="none"/>
    <line x1="95" y1="327" x2="450" y2="327" stroke="#333" stroke-width="0.7"/>
    <rect x="75" y="358" width="8" height="8" rx="1" stroke="#444" stroke-width="0.8" fill="none"/>
    <line x1="95" y1="362" x2="360" y2="362" stroke="#333" stroke-width="0.7"/>
    <rect x="75" y="393" width="8" height="8" rx="1" stroke="#444" stroke-width="0.8" fill="none"/>
    <line x1="95" y1="397" x2="300" y2="397" stroke="#333" stroke-width="0.7"/>
    <rect x="75" y="428" width="8" height="8" rx="1" stroke="#444" stroke-width="0.8" fill="none"/>
    <line x1="95" y1="432" x2="430" y2="432" stroke="#333" stroke-width="0.7"/>
    <rect x="75" y="463" width="8" height="8" rx="1" stroke="#444" stroke-width="0.8" fill="none"/>
    <line x1="95" y1="467" x2="350" y2="467" stroke="#333" stroke-width="0.7"/>
    <rect x="75" y="498" width="8" height="8" rx="1" stroke="#444" stroke-width="0.8" fill="none"/>
    <line x1="95" y1="502" x2="280" y2="502" stroke="#333" stroke-width="0.7"/>
  </g>

  <!-- Scattered noise squares -->
  <g opacity="0.2">
    <rect x="120" y="160" width="4" height="4" fill="#2A2A2A"/>
    <rect x="200" y="195" width="3" height="3" fill="#252525"/>
    <rect x="310" y="170" width="5" height="5" fill="#222"/>
    <rect x="150" y="240" width="3" height="3" fill="#2A2A2A"/>
    <rect x="380" y="210" width="4" height="4" fill="#222"/>
    <rect x="260" y="280" width="5" height="5" fill="#252525"/>
    <rect x="170" y="310" width="3" height="3" fill="#2A2A2A"/>
    <rect x="420" y="260" width="4" height="4" fill="#222"/>
    <rect x="330" y="340" width="3" height="3" fill="#252525"/>
    <rect x="190" y="380" width="5" height="5" fill="#2A2A2A"/>
    <rect x="450" y="310" width="4" height="4" fill="#222"/>
    <rect x="280" y="410" width="3" height="3" fill="#252525"/>
    <rect x="140" y="440" width="4" height="4" fill="#2A2A2A"/>
    <rect x="360" y="390" width="5" height="5" fill="#222"/>
    <rect x="230" y="460" width="3" height="3" fill="#252525"/>
    <rect x="480" y="350" width="4" height="4" fill="#2A2A2A"/>
    <rect x="300" y="480" width="3" height="3" fill="#222"/>
    <rect x="410" y="440" width="5" height="5" fill="#252525"/>
    <rect x="160" y="490" width="4" height="4" fill="#2A2A2A"/>
    <rect x="350" y="470" width="3" height="3" fill="#222"/>
    <rect x="240" y="200" width="4" height="4" fill="#1F1F1F"/>
    <rect x="430" y="175" width="3" height="3" fill="#222"/>
    <rect x="180" y="350" width="5" height="5" fill="#1C1C1C"/>
    <rect x="320" y="420" width="4" height="4" fill="#222"/>
    <rect x="460" y="480" width="3" height="3" fill="#252525"/>
    <rect x="110" y="270" width="4" height="4" fill="#1F1F1F"/>
    <rect x="390" y="155" width="3" height="3" fill="#222"/>
    <rect x="270" y="510" width="5" height="5" fill="#1C1C1C"/>
    <rect x="500" y="230" width="4" height="4" fill="#222"/>
    <rect x="130" y="530" width="3" height="3" fill="#252525"/>
  </g>

  <!-- Red "urgent" dots scattered — distraction -->
  <g opacity="0.25">
    <circle cx="220" cy="195" r="3" fill="#FF3B3B"/>
    <circle cx="380" cy="270" r="2.5" fill="#FF3B3B"/>
    <circle cx="160" cy="370" r="3" fill="#FF3B3B"/>
    <circle cx="440" cy="410" r="2.5" fill="#FF3B3B"/>
    <circle cx="300" cy="490" r="3" fill="#FF3B3B"/>
    <circle cx="130" cy="450" r="2" fill="#FF3B3B"/>
  </g>

  <!-- "BUSY" label -->
  <text x="80" y="565" font-family="monospace" font-size="13" fill="#2A2A2A" letter-spacing="3">BUSY</text>

  <!-- === DIVIDER === -->
  <line x1="560" y1="130" x2="560" y2="540" stroke="#3A3A3A" stroke-width="0.5"/>
  <text x="549" y="342" font-family="monospace" font-size="13" fill="#6A6A6A">vs</text>

  <!-- === RIGHT SIDE: IMPACT — clean, focused === -->

  <!-- Subtle glow backdrop -->
  <rect x="720" y="180" width="280" height="340" rx="4" fill="url(#glowGrad)"/>

  <!-- Arrow shaft -->
  <line x1="860" y1="480" x2="860" y2="175" stroke="url(#arrowGrad)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Arrow head -->
  <polygon points="860,140 838,178 882,178" fill="#00D26A" filter="url(#glow)"/>

  <!-- Data points with connector lines -->
  <g>
    <!-- Point 1: +12% -->
    <line x1="863" y1="440" x2="905" y2="440" stroke="#1A3D2A" stroke-width="0.8"/>
    <circle cx="910" cy="440" r="3.5" fill="#00D26A" opacity="0.6"/>
    <text x="922" y="444" font-family="monospace" font-size="12" fill="#2D7A4A" font-weight="500">+12%</text>

    <!-- Point 2: +28% -->
    <line x1="863" y1="370" x2="920" y2="370" stroke="#1A3D2A" stroke-width="0.8"/>
    <circle cx="925" cy="370" r="3.5" fill="#00D26A" opacity="0.7"/>
    <text x="937" y="374" font-family="monospace" font-size="12" fill="#2D7A4A" font-weight="500">+28%</text>

    <!-- Point 3: +47% -->
    <line x1="863" y1="300" x2="910" y2="300" stroke="#1A3D2A" stroke-width="0.8"/>
    <circle cx="915" cy="300" r="3.5" fill="#00D26A" opacity="0.8"/>
    <text x="927" y="304" font-family="monospace" font-size="12" fill="#2D7A4A" font-weight="500">+47%</text>

    <!-- Point 4: +89% -->
    <line x1="863" y1="230" x2="925" y2="230" stroke="#1A3D2A" stroke-width="0.8"/>
    <circle cx="930" cy="230" r="3.5" fill="#00D26A" opacity="0.9"/>
    <text x="942" y="234" font-family="monospace" font-size="12" fill="#2D7A4A" font-weight="500">+89%</text>
  </g>

  <!-- Small metric labels on the left of the arrow -->
  <g font-family="monospace" font-size="10" fill="#1A3D2A" opacity="0.5">
    <text x="800" y="444" text-anchor="end">leads</text>
    <text x="800" y="374" text-anchor="end">pipeline</text>
    <text x="800" y="304" text-anchor="end">velocity</text>
    <text x="800" y="234" text-anchor="end">revenue</text>
  </g>

  <!-- "IMPACT" label -->
  <text x="810" y="565" font-family="monospace" font-size="14" fill="#00D26A" font-weight="bold" letter-spacing="3">IMPACT</text>

  <!-- === TITLE === -->
  <text x="60" y="62" font-family="'Arial Black', 'Helvetica Neue', sans-serif" font-size="60" font-weight="900" letter-spacing="-1">
    <tspan fill="#FFFFFF">STOP BEING </tspan><tspan fill="#6A6A6A">BUSY.</tspan>
  </text>
  <text x="60" y="118" font-family="'Arial Black', 'Helvetica Neue', sans-serif" font-size="60" font-weight="900" letter-spacing="-1">
    <tspan fill="#FFFFFF">START MAKING </tspan><tspan fill="#00D26A">IMPACT.</tspan>
  </text>

  <!-- === BOTTOM === -->
  <text x="60" y="605" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#6A6A6A">theb2btinkerers.com</text>

  <!-- Bottom accent line -->
  <rect x="0" y="627" width="1200" height="3" fill="#00D26A"/>

  <!-- Subtle border -->
  <rect x="0" y="0" width="1200" height="630" fill="none" stroke="#151515" stroke-width="1"/>
</svg>
